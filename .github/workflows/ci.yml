name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ci:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm --prefix website ci

      - name: Lint
        run: npm --prefix website run lint

      - name: Type check
        run: npm --prefix website run check

      - name: Run unit tests
        run: npm --prefix website run test

      - name: Generate data
        run: npm --prefix website run data:generate

      - name: Build
        run: npm --prefix website run build
        env:
          ASTRO_TELEMETRY_DISABLED: 1
